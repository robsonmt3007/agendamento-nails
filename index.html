<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rita Andrade - Nails Designer</title>
    
    <style>
        :root {
            --accent: #b4867e;
            --text-dark: #5d4037;
            --text-soft: #8b5a3c;
            --glass: rgba(255, 255, 255, 0.9);
            --bg-body: #f4f1ea;
        }

        body.dark-mode {
            --text-dark: #f5ece9; /* Branco mais forte para contraste */
            --text-soft: #dcaea5; /* Rosé mais claro para destaque */
            --glass: rgba(40, 35, 33, 0.95);
            --bg-body: #1a1614;
        }

        /* Ajustes Visuais Gerais */
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; background: var(--bg-body) url('d2fb736130b4a19276c01092cf78d24e.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Playfair Display', serif; }

        .main-card { background: var(--glass); backdrop-filter: blur(12px); width: 95%; height: 95%; max-width: 450px; padding: 1.5rem; border-radius: 30px; display: flex; flex-direction: column; overflow-y: auto; }

        /* Ícone Calendário com destaque no Dark Mode */
        .date-icon { width: 30px; margin-right: 10px; filter: drop-shadow(0 0 5px rgba(180, 134, 126, 0.5)); }
        body.dark-mode .date-icon { filter: brightness(1.5) drop-shadow(0 0 5px var(--accent)); }

        /* Checkboxes Elegantes */
        .services-list { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; text-align: left; }
        .service-option { display: flex; align-items: center; cursor: pointer; color: var(--text-dark); font-size: 1rem; }
        .service-option input { margin-right: 10px; accent-color: var(--accent); }

        .input-group { margin-bottom: 15px; }
        label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-soft); font-weight: 700; }
        input { width: 100%; padding: 12px; border: 1px solid var(--accent); border-radius: 12px; background: rgba(255,255,255,0.1); color: var(--text-dark); }
        
        .btn-confirm { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-card">
    <img src="plano_fundo.png" style="width:120px; margin: 0 auto 15px;">
    
    <div class="input-group">
        <label>Nome e Sobrenome</label>
        <input type="text" id="nome" placeholder="Digite seu nome completo">
    </div>

    <div class="input-group">
        <label>WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(00) 00000-0000" oninput="mascaraTelefone(this)">
    </div>

    <label>Serviços (Escolha um ou mais)</label>
    <div class="services-list" id="servicos">
        <label class="service-option"><input type="checkbox" value="Alongamento"> Alongamento</label>
        <label class="service-option"><input type="checkbox" value="Banho"> Banho</label>
        <label class="service-option"><input type="checkbox" value="Esmaltação em Gel"> Esmaltação em Gel</label>
        <label class="service-option"><input type="checkbox" value="Manicure"> Manicure</label>
        <label class="service-option"><input type="checkbox" value="Pedicure"> Pedicure</label>
    </div>

    <div class="input-group">
        <label style="display:flex; align-items:center;">
            <img src="https://img.icons8.com/wired/64/8b5a3c/calendar.png" class="date-icon"> Data e Hora
        </label>
        <input type="datetime-local" id="data">
    </div>

    <button class="btn-confirm" onclick="enviar()">Agendar Agora</button>
</div>

<script>
    // Máscara de Telefone
    function mascaraTelefone(input) {
        let v = input.value.replace(/\D/g, '');
        v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
        v = v.replace(/(\d{5})(\d)/, '$1-$2');
        input.value = v.substring(0, 15);
    }

    function enviar() {
        const servicos = Array.from(document.querySelectorAll('#servicos input:checked')).map(i => i.value);
        alert("Agendamento: " + servicos.join(", "));
    }
</script>
</body>
</html>
