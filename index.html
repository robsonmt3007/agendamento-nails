<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#b4867e">
    <title>Rita Andrade - Nails Designer</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #b4867e;
            --text-dark: #5d4037;
            --text-soft: #8b5a3c;
            --glass: rgba(255, 255, 255, 0.88);
            --bg-body: #f4f1ea;
            --input-bg: rgba(255, 255, 255, 0.5);
        }

        body.dark-mode {
            --text-dark: #e0d5d0;
            --text-soft: #b4867e;
            --glass: rgba(30, 25, 23, 0.96);
            --bg-body: #1a1614;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%; width: 100%; margin: 0; padding: 0;
            overflow: hidden; transition: 0.4s;
        }

        body {
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-body) url('d2fb736130b4a19276c01092cf78d24e.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Playfair Display', serif;
        }

        .theme-toggle {
            position: absolute; top: 20px; right: 20px; cursor: pointer;
            z-index: 100; opacity: 0.6; transition: 0.3s;
        }
        .theme-toggle svg { width: 26px; height: 26px; fill: var(--text-soft); }

        .main-card {
            background: var(--glass); backdrop-filter: blur(10px);
            width: 92%; height: 92%; max-width: 450px; max-height: 800px;
            padding: 1.5rem; border-radius: 30px; text-align: center;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            justify-content: space-between;
        }

        .logo-main { width: 130px; margin: 0 auto; }
        
        .form-container {
            display: flex; flex-direction: column; gap: 12px; margin: 15px 0;
        }

        .input-group { text-align: left; }
        .input-group label { 
            font-size: 0.75rem; text-transform: uppercase; 
            color: var(--text-soft); font-weight: 700; margin-left: 5px;
        }

        input, select {
            width: 100%; padding: 12px; border: 1px solid var(--accent);
            border-radius: 12px; background: var(--input-bg); color: var(--text-dark);
            font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s;
        }

        input:focus, select:focus { border-width: 2px; }

        .btn-confirm {
            background: var(--accent); color: white; border: none;
            padding: 18px; border-radius: 12px; width: 100%;
            font-weight: bold; text-transform: uppercase; cursor: pointer;
            font-size: 1rem; box-shadow: 0 5px 15px rgba(180, 134, 126, 0.3);
        }

        .insta-footer { margin-top: 8px; font-size: 0.9rem; color: var(--text-dark); font-weight: 600; }
    </style>
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()" id="themeIcon">
    <svg viewBox="0 0 24 24"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/></svg>
</div>

<div class="main-card" id="app-content">
    <img src="plano_fundo.png" alt="Rita Andrade" class="logo-main">
    
    <div class="form-container">
        <div class="input-group">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Seu nome">
        </div>
        <div class="input-group">
            <label>Sobrenome</label>
            <input type="text" id="sobrenome" placeholder="Seu sobrenome">
        </div>
        <div class="input-group">
            <label>WhatsApp / Telefone</label>
            <input type="tel" id="telefone" placeholder="(00) 00000-0000">
        </div>
        <div class="input-group">
            <label>Serviço Desejado</label>
            <select id="servico">
                <option value="" disabled selected>Selecione um serviço...</option>
                <optgroup label="Serviços Individuais">
                    <option>Alongamento</option>
                    <option>Banho</option>
                    <option>Esmaltação em Gel</option>
                    <option>Manutenção</option>
                    <option>Manicure</option>
                    <option>Pedicure</option>
                </optgroup>
                <optgroup label="Serviço Individual + Pedicure">
                    <option>Alongamento + Pedicure</option>
                    <option>Banho + Pedicure</option>
                    <option>Esmaltação em Gel + Pedicure</option>
                    <option>Manutenção + Pedicure</option>
                </optgroup>
            </select>
        </div>
        <div class="input-group">
            <label>Data e Horário</label>
            <input type="datetime-local" id="data_hora">
        </div>
    </div>

    <div class="footer-area">
        <button class="btn-confirm" onclick="finalizar()">Agendar Agora</button>
        <p class="insta-footer">@ritaandradeunhas</p>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('themeIcon');
        body.classList.toggle('dark-mode');
        icon.innerHTML = body.classList.contains('dark-mode') 
            ? '<svg viewBox="0 0 24 24"><path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM2 13h2a1 1 0 1 0 0-2H2a1 1 0 1 0 0 2zm18 0h2a1 1 0 1 0 0-2h-2a1 1 0 1 0 0 2zM11 2v2a1 1 0 1 0 2 0V2a1 1 0 1 0-2 0zm0 18v2a1 1 0 1 0 2 0v-2a1 1 0 1 0-2 0zM5.99 4.58a1 1 0 1 0-1.41 1.41l1.41 1.41a1 1 0 1 0 1.41-1.41L5.99 4.58zm12.02 12.02a1 1 0 1 0-1.41 1.41l1.41 1.41a1 1 0 1 0 1.41-1.41l-1.41-1.41zM4.58 18.01a1 1 0 1 0 1.41 1.41l1.41-1.41a1 1 0 1 0-1.41-1.41l-1.41 1.41zM18.01 5.99a1 1 0 1 0 1.41-1.41l-1.41-1.41a1 1 0 1 0-1.41 1.41l1.41 1.41z"/></svg>'
            : '<svg viewBox="0 0 24 24"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/></svg>';
    }

    function finalizar() {
        const campos = {
            nome: document.getElementById('nome').value,
            servico: document.getElementById('servico').value,
            data: document.getElementById('data_hora').value
        };

        if(!campos.nome || !campos.servico || !campos.data) {
            return alert("Por favor, preencha o nome, serviço e horário.");
        }
        
        document.getElementById('app-content').innerHTML = `
            <img src="plano_fundo.png" class="logo-main">
            <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:center; color:var(--text-dark)">
                <h2 style="font-size: 1.8rem; margin-bottom:10px;">Solicitação Enviada!</h2>
                <p>Obrigada, <b>${campos.nome}</b>!</p>
                <p style="color:var(--text-soft); margin: 15px 0;">Serviço: <b>${campos.servico}</b></p>
                <p>Data: <b>${new Date(campos.data).toLocaleString()}</b></p>
            </div>
            <button class="btn-confirm" onclick="window.location.reload()">Voltar</button>
            <p class="insta-footer">@ritaandradeunhas</p>
        `;
    }
</script>
</body>
</html>
