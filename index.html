<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1614">
    <title>Rita Andrade - Nails Designer</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #b4867e;
            --text-primary: #ffffff;
            --text-secondary: #ffcfc6;
            --glass: rgba(20, 18, 17, 0.98);
            --bg-body: #000000;
            --input-bg: #2d2a29;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; /* Trava a rolagem global */
            background: var(--bg-body) url('d2fb736130b4a19276c01092cf78d24e.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-primary);
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            width: 100%; height: 100%; /* Preenchimento total */
            max-width: 550px; /* Limite elegante para Desktop */
            margin: auto; border-radius: 0; /* Bordas retas para preencher tudo */
            display: flex; flex-direction: column;
            padding: 2rem; border: none;
            position: absolute; top: 0; left: 50%; transform: translate(-50%, 0);
            justify-content: space-around; /* Distribui o conteúdo verticalmente */
        }

        /* Otimização para Desktop/Notebook */
        @media (min-width: 1024px) {
            .main-card {
                height: 95vh;
                margin: 2.5vh auto;
                border-radius: 30px;
                border: 1px solid rgba(180, 134, 126, 0.2);
                top: 50%; transform: translate(-50%, -50%);
            }
        }

        /* Logo marca mais destacada e centralizada */
        .logo-main { 
            width: 100%;
            max-width: 280px; /* Aumentado consideravelmente */
            height: auto;
            margin: 0 auto 1.5rem; 
            filter: drop-shadow(0 0 15px rgba(180, 134, 126, 0.4));
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { text-align: left; }
        .input-group label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1.5px; margin-bottom: 6px; display: block; font-weight: 600; }
        
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid rgba(180, 134, 126, 0.5);
            background: var(--input-bg); color: #fff; font-size: 1rem; outline: none;
        }

        .services-label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); text-align: left; margin-bottom: 10px; font-weight: 600; letter-spacing: 1.5px;}
        .services-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
        }

        .service-btn {
            background: var(--input-bg); border: 1px solid rgba(180, 134, 126, 0.4);
            padding: 16px 8px; border-radius: 12px; color: #fff;
            font-size: 0.85rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; font-weight: 400; text-align: center;
        }

        .service-btn.selected {
            background: var(--accent);
            border-color: #fff;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(180, 134, 126, 0.6);
        }

        .date-input { margin-bottom: 25px; }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1); transform: scale(1.3); }

        .btn-confirm {
            background: var(--accent); color: white; border: none;
            padding: 20px; border-radius: 15px; width: 100%;
            font-weight: 600; text-transform: uppercase; cursor: pointer;
            letter-spacing: 2px; font-size: 1.1rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .insta-footer { 
            margin-top: 2rem; 
            font-size: 1rem; 
            color: var(--text-secondary); 
            font-family: 'Playfair Display', serif; 
            text-align: center; /* Centraliza o nome */
            width: 100%;
        }
    </style>
</head>
<body>

<div class="main-card" id="app-content">
    <img src="plano_fundo.png" alt="Rita Andrade" class="logo-main">
    
    <div class="input-row">
        <div class="input-group">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Nome">
        </div>
        <div class="input-group">
            <label>Sobrenome</label>
            <input type="text" id="sobrenome" placeholder="Sobrenome">
        </div>
    </div>

    <div class="input-group" style="margin-bottom:15px">
        <label>Celular / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(00) 00000-0000" onkeyup="mascaraTel(this)">
    </div>

    <div class="services-label">Selecione os Serviços</div>
    <div class="services-grid">
        <div class="service-btn" onclick="toggleService(this, 'Alongamento')">Alongamento</div>
        <div class="service-btn" onclick="toggleService(this, 'Banho')">Banho</div>
        <div class="service-btn" onclick="toggleService(this, 'Esmaltação em Gel')">Esmaltação em Gel</div>
        <div class="service-btn" onclick="toggleService(this, 'Manutenção')">Manutenção</div>
        <div class="service-btn" onclick="toggleService(this, 'Pedicure')">Pedicure</div>
        <div class="service-btn" onclick="toggleService(this, 'Manicure')">Manicure</div>
    </div>

    <div class="input-group date-input">
        <label>Data e Horário</label>
        <input type="datetime-local" id="data_hora">
    </div>

    <button class="btn-confirm" onclick="finalizar()">Confirmar Agendamento</button>
    
    <p class="insta-footer">@ritinhaandradeunhas</p>
</div>

<script>
    let servicosSelecionados = [];

    function toggleService(element, serviceName) {
        element.classList.toggle('selected');
        if (servicosSelecionados.includes(serviceName)) {
            servicosSelecionados = servicosSelecionados.filter(s => s !== serviceName);
        } else {
            servicosSelecionados.push(serviceName);
        }
    }

    function mascaraTel(i) {
        let v = i.value.replace(/\D/g,'');
        v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
        v = v.replace(/(\d)(\d{4})$/,"$1-$2");
        i.value = v;
    }

    function finalizar() {
        const nome = document.getElementById('nome').value;
        const sobrenome = document.getElementById('sobrenome').value;
        const data = document.getElementById('data_hora').value;

        if(!nome || !sobrenome || servicosSelecionados.length === 0 || !data) {
            return alert("Por favor, preencha todos os campos e selecione ao menos um serviço.");
        }

        document.getElementById('app-content').innerHTML = `
            <img src="plano_fundo.png" class="logo-main" style="max-width:200px">
            <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:center; text-align:center;">
                <h2 style="color:var(--accent); font-family:'Playfair Display'; font-size:2.5rem; margin-bottom:15px">Quase pronto!</h2>
                <p style="font-size:1.1rem">Obrigada, <b>${nome}</b>.</p>
                <p style="font-size:0.95rem; color:var(--text-secondary); margin:20px 0">Serviços: ${servicosSelecionados.join(', ')}</p>
                <p style="font-size:1.1rem">Horário: <b>${new Date(data).toLocaleString()}</b></p>
            </div>
            <button class="btn-confirm" onclick="window.location.reload()">Corrigir Dados</button>
            <p class="insta-footer">@ritinhaandradeunhas</p>
        `;
    }
</script>
</body>
</html>
