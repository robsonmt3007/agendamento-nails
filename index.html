<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#b4867e">
    <title>Rita Andrade - Nails Designer</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #b4867e;
            --text-dark: #5d4037;
            --text-soft: #8b5a3c;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --body-bg: #f4f1ea;
        }

        body.dark-mode {
            --text-dark: #e0d5d0;
            --text-soft: #b4867e;
            --glass-bg: rgba(30, 25, 23, 0.92);
            --body-bg: #1a1614;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Garante que o corpo ocupe exatamente a altura da tela sem rolar */
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            background: var(--body-bg) url('d2fb736130b4a19276c01092cf78d24e.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Playfair Display', serif;
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            opacity: 0.6;
            z-index: 10;
        }
        .theme-toggle svg { width: 22px; height: 22px; fill: var(--text-soft); }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            width: 85%;
            /* O segredo: max-height evita a rolagem e o padding é reduzido em telas pequenas */
            max-height: 90vh;
            max-width: 420px; 
            padding: 1.5rem;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            overflow-y: auto; /* Caso o conteúdo ainda seja muito grande, ele rola apenas dentro do card */
        }

        .logo-main {
            width: 100%;
            max-width: 160px;
            margin: 0 auto 0.5rem;
        }

        .text-agenda { font-style: italic; font-size: 1.2rem; color: var(--text-soft); margin: 0; }
        .text-aberta { font-weight: 700; font-size: 2.5rem; color: var(--text-dark); margin: 0 0 0.5rem 0; line-height: 1; }
        .icon-heart { width: 50px; margin: 0 auto 0.5rem; }
        .text-call { font-size: 1rem; color: var(--text-dark); margin-bottom: 1rem; }

        .booking-area {
            border: 1.5px solid var(--text-soft);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
        }

        input[type="datetime-local"] {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-dark);
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        .btn-confirm {
            background: var(--text-soft);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .insta-footer { margin-top: 1rem; font-size: 0.85rem; color: var(--text-dark); font-weight: 600; }
    </style>
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()" id="themeIcon">
    <svg viewBox="0 0 24 24" id="moonIcon"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/></svg>
</div>

<div class="main-card" id="app-content">
    <img src="plano_fundo.png" alt="Rita Andrade" class="logo-main">

    <div>
        <p class="text-agenda">agenda</p>
        <h1 class="text-aberta">aberta</h1>
    </div>

    <img src="https://img.icons8.com/wired/100/8b5a3c/calendar-with-a-heart.png" class="icon-heart">

    <p class="text-call">marque seu horário!</p>

    <div class="booking-area">
        <input type="datetime-local" id="data_hora">
    </div>

    <button class="btn-confirm" onclick="finalizar()">Confirmar Agora</button>

    <p class="insta-footer">@ritaandradeunhas</p>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const iconContainer = document.getElementById('themeIcon');
        body.classList.toggle('dark-mode');
        
        if (body.classList.contains('dark-mode')) {
            iconContainer.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM2 13h2a1 1 0 1 0 0-2H2a1 1 0 1 0 0 2zm18 0h2a1 1 0 1 0 0-2h-2a1 1 0 1 0 0 2zM11 2v2a1 1 0 1 0 2 0V2a1 1 0 1 0-2 0zm0 18v2a1 1 0 1 0 2 0v-2a1 1 0 1 0-2 0zM5.99 4.58a1 1 0 1 0-1.41 1.41l1.41 1.41a1 1 0 1 0 1.41-1.41L5.99 4.58zm12.02 12.02a1 1 0 1 0-1.41 1.41l1.41 1.41a1 1 0 1 0 1.41-1.41l-1.41-1.41zM4.58 18.01a1 1 0 1 0 1.41 1.41l1.41-1.41a1 1 0 1 0-1.41-1.41l-1.41 1.41zM18.01 5.99a1 1 0 1 0 1.41-1.41l-1.41-1.41a1 1 0 1 0-1.41 1.41l1.41 1.41z"/></svg>';
        } else {
            iconContainer.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/></svg>';
        }
    }

    function finalizar() {
        const data = document.getElementById('data_hora').value;
        if(!data) return alert("Por favor, selecione um horário.");
        document.getElementById('app-content').innerHTML = `
            <img src="plano_fundo.png" class="logo-main" style="max-width:120px">
            <h2 style="color: var(--text-dark); margin: 15px 0;">Enviado!</h2>
            <p style="color: var(--text-soft)">Horário reservado para:</p>
            <p style="font-weight: bold; font-size: 1.1rem; color: var(--text-dark)">${new Date(data).toLocaleString()}</p>
            <button class="btn-confirm" onclick="window.location.reload()" style="margin-top:20px">Voltar</button>
            <p class="insta-footer">@ritaandradeunhas</p>
        `;
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
