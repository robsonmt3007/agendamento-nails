<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Rita Andrade - Nails Designer</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #b4867e;
            --text-primary: #ffffff;
            --text-secondary: #ffcfc6;
            --glass: rgba(20, 18, 17, 0.98);
            --bg-body: #000000;
            --input-bg: #2d2a29;
            --whatsapp-green: #25d366;
        }

        body.light-mode {
            --text-primary: #5d4037;
            --text-secondary: #8b5a3c;
            --glass: rgba(255, 255, 255, 0.96);
            --bg-body: #f4f1ea;
            --input-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100svh; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; position: fixed; 
            background: var(--bg-body) url('d2fb736130b4a19276c01092cf78d24e.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            transition: background 0.3s ease;
        }

        /* BOTÃO TEMA HÍBRIDO - DISCRETO NO TOPO */
        .theme-switch {
            position: absolute; 
            top: calc(15px + env(safe-area-inset-top)); 
            right: 20px; 
            cursor: pointer; 
            z-index: 1000;
            opacity: 0.8;
        }
        .theme-switch svg { width: 22px; height: 22px; fill: var(--accent); }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            width: 100%;
            height: 100svh;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(10px + env(safe-area-inset-top)) 1.2rem calc(15px + env(safe-area-inset-bottom));
        }

        /* COMPACTAÇÃO DE ESPAÇOS */
        .header-area { flex: 0 0 auto; text-align: center; margin-bottom: -10px; }
        .logo-main { width: 85%; max-width: 230px; height: auto; }

        .form-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            gap: 8px; /* Espaço mínimo e funcional */
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-group label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 3px; }
        
        input {
            width: 100%; padding: 11px; border-radius: 10px; border: 1.5px solid var(--accent);
            background: var(--input-bg); color: var(--text-primary); font-size: 0.9rem; outline: none;
        }

        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .service-btn {
            background: var(--input-bg); border: 1.5px solid var(--accent);
            padding: 10px 2px; border-radius: 10px; color: var(--text-primary);
            font-size: 0.72rem; text-transform: uppercase; font-weight: 700;
            cursor: pointer; text-align: center;
        }
        .service-btn.selected { background: var(--accent); color: #fff; border-color: #fff; }

        /* ÍCONES GPS ANDROID/GERAL */
        .location-area { margin-top: 5px; text-align: center; }
        .location-btns { display: flex; justify-content: center; gap: 35px; margin-top: 5px; }
        .loc-btn img { 
            width: 85px; 
            height: 85px; 
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.4)); 
        }

        /* RODAPÉ SUBIDO PARA SEGURANÇA */
        .footer-area { flex: 0 0 auto; padding-top: 5px; margin-bottom: 5px; }
        .btn-confirm {
            background: var(--accent); color: white; border: none;
            padding: 16px; border-radius: 12px; width: 100%;
            font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 1rem;
            box-shadow: 0 4px 15px rgba(180, 134, 126, 0.3);
        }

        .insta-footer { 
            margin-top: 12px; font-size: 0.9rem; color: var(--text-secondary); 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; font-weight: 700; font-family: 'Playfair Display', serif;
        }
        .insta-footer svg { width: 18px; height: 18px; fill: var(--accent); }

        /* AJUSTES PARA TELAS PEQUENAS (IPHONE ANTIGO) */
        @media (max-height: 700px) {
            .logo-main { max-width: 170px; }
            .loc-btn img { width: 70px; height: 70px; }
            .form-area { gap: 4px; }
            input { padding: 9px; }
            .service-btn { padding: 8px 2px; }
            .btn-confirm { padding: 14px; }
        }
    </style>
</head>
<body class="dark-mode">

<div class="theme-switch" onclick="toggleTheme()" id="themeBtn" title="Alternar Modo Claro/Escuro">
    <svg viewBox="0 0 24 24" id="themeIcon">
        <path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/>
    </svg>
</div>

<div class="main-card">
    <div class="header-area">
        <img src="plano_fundo.png" alt="Rita Andrade" class="logo-main">
    </div>
    
    <div class="form-area">
        <div class="input-row">
            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Seu nome">
            </div>
            <div class="input-group">
                <label>Sobrenome</label>
                <input type="text" id="sobrenome" placeholder="Sobrenome">
            </div>
        </div>
        
        <div class="input-group">
            <label>Nossos Serviços</label>
            <div class="services-grid">
                <div class="service-btn" onclick="toggleService(this, 'ALONGAMENTO')">ALONGAMENTO</div>
                <div class="service-btn" onclick="toggleService(this, 'BANHO')">BANHO</div>
                <div class="service-btn" onclick="toggleService(this, 'ESMALTAÇÃO EM GEL')">ESMALT. GEL</div>
                <div class="service-btn" onclick="toggleService(this, 'MANUTENÇÃO')">MANUTENÇÃO</div>
                <div class="service-btn" onclick="toggleService(this, 'PEDICURE')">PEDICURE</div>
                <div class="service-btn" onclick="toggleService(this, 'MANICURE')">MANICURE</div>
            </div>
        </div>

        <div class="input-group">
            <label>Data e Horário</label>
            <input type="datetime-local" id="data_hora">
        </div>

        <div class="location-area">
            <label>Nossa Localização</label>
            <div class="location-btns">
                <a href="https://maps.google.com" target="_blank" class="loc-btn">
                    <img src="maps.png" alt="Google Maps">
                </a>
                <a href="https://waze.com" target="_blank" class="loc-btn">
                    <img src="waze.png" alt="Waze">
                </a>
            </div>
        </div>
    </div>

    <div class="footer-area">
        <button class="btn-confirm" onclick="finalizar()">Confirmar Agendamento</button>
        <a href="https://instagram.com/ritaandradeunhas" class="insta-footer" target="_blank">
            <svg viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8z"/></svg>
            @ritaandradeunhas
        </a>
    </div>
</div>

<script>
    // DETECÇÃO AUTOMÁTICA DE TEMA DO SISTEMA
    function checkSystemTheme() {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.body.classList.add('light-mode');
            updateIcon(true);
        }
    }

    function toggleTheme() {
        const isLight = document.body.classList.toggle('light-mode');
        updateIcon(isLight);
    }

    function updateIcon(isLight) {
        const icon = document.getElementById('themeIcon');
        if (isLight) {
            icon.innerHTML = '<path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM11 2v2a1 1 0 1 0 2 0V2a1 1 0 1 0-2 0zm0 18v2a1 1 0 1 0 2 0v-2a1 1 0 1 0-2 0zM5.99 4.58a1 1 0 1 0-1.41 1.41l1.06 1.06a1 1 0 1 0 1.41-1.41L5.99 4.58zm12.37 12.37a1 1 0 1 0-1.41 1.41l1.06 1.06a1 1 0 1 0 1.41-1.41L5.99 4.58z"/>';
        } else {
            icon.innerHTML = '<path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/>';
        }
    }

    // Executa ao carregar
    window.onload = checkSystemTheme;

    let servicosSelecionados = [];
    function toggleService(element, serviceName) {
        element.classList.toggle('selected');
        if (servicosSelecionados.includes(serviceName)) {
            servicosSelecionados = servicosSelecionados.filter(s => s !== serviceName);
        } else {
            servicosSelecionados.push(serviceName);
        }
    }

    function finalizar() {
        const nome = document.getElementById('nome').value;
        const data = document.getElementById('data_hora').value;
        if (!nome || servicosSelecionados.length === 0 || !data) { alert("Por favor, preencha tudo!"); return; }
        const msg = `✨ Agendamento Rita Nails ✨\nCliente: ${nome}\nServiços: ${servicosSelecionados.join(', ')}\nData: ${new Date(data).toLocaleString()}`;
        window.location.href = `https://api.whatsapp.com/send?phone=5585986320083&text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
