<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rita Nails">
    <link rel="apple-touch-icon" href="plano_fundo.png">
    <meta name="theme-color" content="#1a1614">
    
    <title>Rita Andrade - Nails Designer</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #b4867e;
            --text-primary: #ffffff;
            --text-secondary: #ffcfc6;
            --glass: rgba(20, 18, 17, 0.98);
            --bg-body: #000000;
            --input-bg: #2d2a29;
            --whatsapp-green: #25d366;
        }

        body.light-mode {
            --text-primary: #5d4037;
            --text-secondary: #8b5a3c;
            --glass: rgba(255, 255, 255, 0.95);
            --bg-body: #f4f1ea;
            --input-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100svh; 
            width: 100%; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            position: fixed; 
            background: var(--bg-body) url('d2fb736130b4a19276c01092cf78d24e.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            width: 100%;
            height: 100svh;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* Padding lateral seguro para evitar toques na borda */
            padding: calc(5px + env(safe-area-inset-top)) 1rem calc(8px + env(safe-area-inset-bottom));
        }

        .header-area { flex: 0 0 auto; text-align: center; }
        .logo-main { width: 100%; max-width: 160px; height: auto; margin-bottom: -5px; }

        .form-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            gap: 8px; 
            width: 100%;
            overflow: hidden; /* Trava vazamentos */
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        
        .input-group { width: 100%; overflow: hidden; }
        .input-group label { font-size: 0.6rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 2px; }
        
        input {
            width: 100%; 
            max-width: 100%; /* Força o limite no iOS */
            padding: 10px; 
            border-radius: 10px; 
            border: 1.5px solid var(--accent);
            background: var(--input-bg); 
            color: var(--text-primary); 
            font-size: 0.9rem; 
            outline: none;
            display: block;
            appearance: none; /* Remove estilos nativos que deformam largura */
            -webkit-appearance: none;
        }

        /* Ajuste específico para o campo de data no iPhone */
        input[type="datetime-local"] {
            min-height: 40px;
            padding-right: 5px; /* Reduz padding para não empurrar o ícone nativo */
        }

        .input-with-icon { position: relative; width: 100%; }
        .input-with-icon svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: var(--whatsapp-green); z-index: 2; }
        .input-with-icon input { padding-left: 32px; }

        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; }
        .service-btn {
            background: var(--input-bg); border: 1.5px solid var(--accent);
            padding: 8px 2px; border-radius: 8px; color: var(--text-primary);
            font-size: 0.65rem; text-transform: uppercase; font-weight: 700;
            cursor: pointer; text-align: center;
        }
        .service-btn.selected { background: var(--accent); color: #fff; border-color: #fff; }

        .location-area { padding: 5px 0; text-align: center; border-top: 1px solid rgba(180, 134, 126, 0.1); }
        .location-area label { font-size: 0.58rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; margin-bottom: 5px; display: block;}
        .location-btns { display: flex; justify-content: center; gap: 30px; }
        .loc-btn img { width: 65px; height: 65px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }

        .footer-area { flex: 0 0 auto; padding-bottom: 10px; text-align: center; width: 100%; }
        .btn-confirm {
            background: var(--accent); color: white; border: none;
            padding: 14px; border-radius: 12px; width: 100%;
            font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 0.9rem;
        }

        .insta-footer { 
            margin-top: 8px; font-size: 0.85rem; color: var(--text-secondary); 
            font-family: 'Playfair Display', serif; display: flex;
            align-items: center; justify-content: center; gap: 6px;
            font-weight: 700; text-decoration: none;
        }
        .insta-footer svg { width: 16px; height: 16px; fill: var(--accent); }

        @media (min-height: 750px) {
            .logo-main { max-width: 190px; }
            input { padding: 12px; }
            .service-btn { padding: 11px 4px; font-size: 0.72rem; }
            .loc-btn img { width: 80px; height: 80px; }
            .form-area { gap: 12px; }
        }
    </style>
</head>
<body class="dark-mode">

<div class="main-card">
    <div class="header-area">
        <img src="plano_fundo.png" alt="Rita Andrade" class="logo-main">
    </div>
    
    <div class="form-area">
        <div class="input-row">
            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Nome" maxlength="20" oninput="validarFormatarNome(this)" onblur="saveData()">
            </div>
            <div class="input-group">
                <label>Sobrenome</label>
                <input type="text" id="sobrenome" placeholder="Sobrenome" maxlength="20" oninput="validarFormatarNome(this)" onblur="saveData()">
            </div>
        </div>
        
        <div class="input-group">
            <label>WhatsApp</label>
            <div class="input-with-icon">
                <svg viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.7 17.8 69.7 27.2 106.2 27.2 122.4 0 222-99.6 222-222 0-59.3-23-115.1-65-157.1zM223.9 446.3c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 365.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.5-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 54 81.2 54 130.4 0 101.7-82.8 184.5-184.5 184.5zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.4-8.6-44.6-27.5-16.4-14.7-27.5-32.8-30.7-38.3-3.2-5.6-.3-8.6 2.5-11.4 2.5-2.5 5.6-6.5 8.3-9.7 2.8-3.3 3.7-5.6 5.6-9.3 1.9-3.7 .9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" oninput="mascaraTel(this)">
            </div>
        </div>

        <div class="input-group">
            <label>Nossos Serviços</label>
            <div class="services-grid">
                <div class="service-btn" onclick="toggleService(this, 'ALONGAMENTO')">ALONGAMENTO</div>
                <div class="service-btn" onclick="toggleService(this, 'BANHO')">BANHO</div>
                <div class="service-btn" onclick="toggleService(this, 'ESMALTAÇÃO EM GEL')">ESMALT. GEL</div>
                <div class="service-btn" onclick="toggleService(this, 'MANUTENÇÃO')">MANUTENÇÃO</div>
                <div class="service-btn" onclick="toggleService(this, 'PEDICURE')">PEDICURE</div>
                <div class="service-btn" onclick="toggleService(this, 'MANICURE')">MANICURE</div>
            </div>
        </div>

        <div class="input-group">
            <label>Data e Horário</label>
            <input type="datetime-local" id="data_hora">
        </div>

        <div class="location-area">
            <label>Nossa Localização</label>
            <div class="location-btns">
                <a href="https://maps.google.com/?q=-3.7226,-38.6534" target="_blank" class="loc-btn">
                    <img src="maps.png" alt="Google Maps">
                </a>
                <a href="https://waze.com/ul?q=-3.7226,-38.6534&navigate=yes" target="_blank" class="loc-btn">
                    <img src="waze.png" alt="Waze">
                </a>
            </div>
        </div>
    </div>

    <div class="footer-area">
        <button class="btn-confirm" onclick="finalizar()">Confirmar Agendamento</button>
        <a href="https://instagram.com/ritaandradeunhas" class="insta-footer" target="_blank">
            <svg viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/></svg>
            ritaandradeunhas
        </a>
    </div>
</div>

<script>
    // Scripts simplificados para foco no CSS
    function validarFormatarNome(input) {
        input.value = input.value.replace(/[^a-zA-ZáàâãéèêíïóôõöúçñÁÀÂÃÉÈÊÍÏÓÔÕÖÚÇÑ\s]/g, "");
    }
    function mascaraTel(i) {
        let v = i.value.replace(/\D/g,'');
        v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
        v = v.replace(/(\d)(\d{4})$/,"$1-$2");
        i.value = v;
    }
    let servicosSelecionados = [];
    function toggleService(element, serviceName) {
        element.classList.toggle('selected');
        if (servicosSelecionados.includes(serviceName)) {
            servicosSelecionados = servicosSelecionados.filter(s => s !== serviceName);
        } else {
            servicosSelecionados.push(serviceName);
        }
    }
    function finalizar() {
        const nome = document.getElementById('nome').value;
        const data = document.getElementById('data_hora').value;
        if (!nome || servicosSelecionados.length === 0 || !data) { alert("Preencha todos os campos!"); return; }
        const msg = `✨ *NOVO AGENDAMENTO* ✨\n\n👤 *Cliente:* ${nome}\n💅 *Serviços:* ${servicosSelecionados.join(', ')}\n📅 *Data:* ${new Date(data).toLocaleString()}`;
        window.location.href = `https://api.whatsapp.com/send?phone=5585986320083&text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
