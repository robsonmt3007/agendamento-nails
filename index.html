<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rita Andrade - Nails Designer</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo_icon_192.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #b4867e;
            --text-primary: #ffffff;
            --text-secondary: #ffcfc6;
            --glass: rgba(15, 13, 12, 0.98);
            --bg-body: #000000;
            --input-bg: #1a1817;
        }

        body.light-mode {
            --text-primary: #5d4037;
            --text-secondary: #8b5a3c;
            --glass: rgba(255, 255, 255, 0.96);
            --bg-body: #f4f1ea;
            --input-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden !important; 
            position: fixed; 
            background: var(--bg-body);
            font-family: 'Montserrat', sans-serif;
        }

        .main-card {
            background: var(--glass);
            width: 100%; height: 100%;
            max-width: 500px; margin: 0 auto;
            display: flex; flex-direction: column;
            padding: 15px 1.5rem 25px;
            touch-action: none;
        }

        .header-area { flex: 0 0 auto; text-align: center; margin-bottom: 15px; margin-top: 5px; }
        .logo-main { width: 75%; max-width: 200px; height: auto; }

        .form-area { 
            flex: 1 1 auto; display: flex; flex-direction: column; 
            gap: 12px; justify-content: center;
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 5px; }
        
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--accent);
            background: var(--input-bg); color: var(--text-primary); font-size: 0.95rem; outline: none;
            box-sizing: border-box;
        }

        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .service-btn {
            background: var(--input-bg); border: 1px solid var(--accent);
            padding: 12px 5px; border-radius: 8px; color: var(--text-primary);
            font-size: 0.75rem; font-weight: 700; cursor: pointer; text-align: center;
        }
        .service-btn.selected { background: var(--accent); color: #fff; border-color: #fff; }

        .location-area { margin-top: 25px; text-align: center; }
        .location-area label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 12px; }
        .location-btns { display: flex; justify-content: center; gap: 45px; align-items: center; }
        .loc-btn img { height: 48px; width: auto; border-radius: 10px; }

        .footer-area { flex: 0 0 auto; margin-top: 20px; }
        .btn-confirm {
            background: var(--accent); color: white; border: none;
            padding: 18px; border-radius: 12px; width: 100%;
            font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 1.1rem;
        }

        .insta-footer { margin-top: 15px; font-size: 1rem; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-weight: 700; }

        @supports (-webkit-touch-callout: none) {
            .main-card { padding: 10px 1.5rem calc(10px + env(safe-area-inset-bottom)) !important; }
            .header-area { margin-bottom: 5px !important; }
            .logo-main { width: 55% !important; }
            input { -webkit-appearance: none; }
            .location-area { margin-top: 10px !important; }
            .footer-area { margin-top: 10px !important; }
            .btn-confirm { padding: 15px !important; font-size: 1rem !important; }
        }

        .theme-switch { position: absolute; top: 15px; right: 20px; cursor: pointer; z-index: 1000; }
        .theme-switch svg { width: 22px; height: 22px; fill: var(--accent); }
    </style>
</head>
<body class="dark-mode">

<div class="theme-switch" onclick="toggleTheme()">
    <svg viewBox="0 0 24 24" id="themeIcon">
        <path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/>
    </svg>
</div>

<div class="main-card">
    <div class="header-area">
        <img src="plano_fundo.png" alt="Rita Andrade" class="logo-main">
    </div>
    
    <div class="form-area">
        <div class="input-row">
            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Seu nome">
            </div>
            <div class="input-group">
                <label>Sobrenome</label>
                <input type="text" id="sobrenome" placeholder="Sobrenome">
            </div>
        </div>
        
        <div class="input-group">
            <label>Nossos Serviços</label>
            <div class="services-grid">
                <div class="service-btn" onclick="toggleService(this, 'ALONGAMENTO')">ALONGAMENTO</div>
                <div class="service-btn" onclick="toggleService(this, 'BANHO')">BANHO</div>
                <div class="service-btn" onclick="toggleService(this, 'ESMALT. GEL')">ESMALT. GEL</div>
                <div class="service-btn" onclick="toggleService(this, 'MANUTENÇÃO')">MANUTENÇÃO</div>
                <div class="service-btn" onclick="toggleService(this, 'PEDICURE')">PEDICURE</div>
                <div class="service-btn" onclick="toggleService(this, 'MANICURE')">MANICURE</div>
            </div>
        </div>

        <div class="input-group">
            <label>Data e Horário</label>
            <input type="datetime-local" id="data_hora">
        </div>

        <div class="location-area">
            <label>Nossa Localização</label>
            <div class="location-btns">
                <a href="https://www.google.com/maps/search/?api=1&query=Rita+Andrade+Nails" target="_blank" class="loc-btn"><img src="maps.png" alt="Google Maps"></a>
                <a href="https://waze.com/ul?navigate=yes" target="_blank" class="loc-btn"><img src="waze.png" alt="Waze"></a>
            </div>
        </div>
    </div>

    <div class="footer-area">
        <button class="btn-confirm" onclick="vibrarEConfirmar()">Confirmar Agendamento</button>
        <a href="https://instagram.com/ritaandradeunhas" class="insta-footer" target="_blank">@ritaandradeunhas</a>
    </div>
</div>

<script>
    function toggleTheme() { 
        const isLight = document.body.classList.toggle('light-mode');
        document.getElementById('themeIcon').innerHTML = isLight ? 
            '<path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM11 2v2a1 1 0 1 0 2 0V2a1 1 0 1 0-2 0zm0 18v2a1 1 0 1 0 2 0v-2a1 1 0 1 0-2 0z"/>' : 
            '<path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/>';
    }

    let servicos = [];
    function toggleService(btn, s) { 
        btn.classList.toggle('selected'); 
        servicos.includes(s) ? servicos = servicos.filter(x => x !== s) : servicos.push(s); 
    }

    function vibrarEConfirmar() {
        if ("vibrate" in navigator) navigator.vibrate(50);
        enviarWhatsApp();
    }

    function enviarWhatsApp() { 
        const n = document.getElementById('nome').value; 
        const sbr = document.getElementById('sobrenome').value;
        const d = document.getElementById('data_hora').value; 
        
        if(!n || !d || servicos.length === 0) return alert("Por favor, preencha todos os campos e escolha pelo menos um serviço."); 

        const cliente = `${n} ${sbr}`;
        const listaServicos = servicos.join(', ');
        
        // Formatação da data
        const dataObjeto = new Date(d);
        const dataFormatada = dataObjeto.toLocaleString('pt-BR', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
        
        // MENSAGEM FINALIZADA (Somente WhatsApp)
        const msg = `✨ *Agendamento Rita Nails* ✨\n\n` +
                    `*Cliente:* ${cliente}\n` +
                    `*Serviços:* ${listaServicos}\n` +
                    `*Data:* ${dataFormatada}\n\n` +
                    `_Me envie essa mensagem finalizar seu agendamento! Em breve lhe enviarei uma mensagem para confirmar o seu horário e deixar tudo pronto para o seu atendimento. Até logo!_ 🌸`;

        // Redireciona diretamente para o WhatsApp
        window.location.href = `https://api.whatsapp.com/send?phone=5585986320083&text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
