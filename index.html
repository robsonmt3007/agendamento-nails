<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#b4867e">
    <title>Rita Andrade - Nails Designer</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #b4867e;
            --text-dark: #5d4037;
            --text-soft: #8b5a3c;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Fundo nítido baseado na imagem enviada */
            background: url('d2fb736130b4a19276c01092cf78d24e.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Playfair Display', serif;
        }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            width: 90%;
            /* Ajuste inteligente de tamanho para Desktop vs Mobile */
            max-width: 450px; 
            padding: 2.5rem 1.5rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            margin: 20px;
            transition: all 0.3s ease;
        }

        /* Otimização para telas maiores (Desktop/Notebook) */
        @media (min-width: 1024px) {
            .main-card {
                max-width: 500px;
                padding: 3.5rem 2.5rem;
            }
            .text-aberta { font-size: 3.5rem !important; }
        }

        .logo-main {
            width: 100%;
            max-width: 200px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        .text-agenda {
            font-style: italic;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: var(--text-soft);
            margin: 0;
        }

        .text-aberta {
            font-weight: 700;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--text-dark);
            margin: 0 0 1rem 0;
            line-height: 1;
        }

        .icon-heart {
            width: clamp(50px, 10vw, 70px);
            margin-bottom: 1rem;
        }

        .text-call {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: var(--text-dark);
            margin-bottom: 2rem;
        }

        .booking-area {
            border: 1.5px solid var(--text-soft);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.5);
        }

        input[type="datetime-local"] {
            width: 100%;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-dark);
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            cursor: pointer;
        }

        .btn-confirm {
            background: var(--text-soft);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-confirm:hover { background: var(--text-dark); }

        .insta-footer {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--text-dark);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="main-card" id="app-content">
    <img src="plano_fundo.png" alt="Rita Andrade" class="logo-main">

    <p class="text-agenda">agenda</p>
    <h1 class="text-aberta">aberta</h1>

    <img src="https://img.icons8.com/wired/100/8b5a3c/calendar-with-a-heart.png" class="icon-heart" alt="Ícone Calendário">

    <p class="text-call">marque seu horário!</p>

    <div class="booking-area">
        <input type="datetime-local" id="data_hora">
    </div>

    <button class="btn-confirm" onclick="finalizar()">Confirmar Agora</button>

    <p class="insta-footer">@ritaandradeunhas</p>
</div>

<script>
    function finalizar() {
        const data = document.getElementById('data_hora').value;
        if(!data) return alert("Por favor, selecione um horário.");

        document.getElementById('app-content').innerHTML = `
            <img src="plano_fundo.png" class="logo-main">
            <h2 style="color: var(--text-dark); margin-top: 20px;">Solicitação Enviada!</h2>
            <p style="color: var(--text-soft)">Recebemos seu pedido para:</p>
            <p style="font-weight: bold; font-size: 1.3rem; color: var(--text-dark)">${new Date(data).toLocaleString()}</p>
            <button class="btn-confirm" onclick="window.location.reload()" style="margin-top:20px">Voltar</button>
            <p class="insta-footer">@ritaandradeunhas</p>
        `;
    }

    // Gerenciador de Versão e Atualização Automática
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        window.location.reload(); 
                    }
                };
            };
        });
    }
</script>
</body>
</html>
