<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1614">
    <title>Rita Andrade - Nails Designer</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #b4867e;
            --text-primary: #ffffff;
            --text-secondary: #ffcfc6;
            --glass: rgba(20, 18, 17, 0.98);
            --bg-body: #000000;
            --input-bg: #2d2a29;
            --whatsapp-green: #25d366;
        }

        body.light-mode {
            --text-primary: #5d4037;
            --text-secondary: #8b5a3c;
            --glass: rgba(255, 255, 255, 0.95);
            --bg-body: #f4f1ea;
            --input-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; 
            background: var(--bg-body) url('d2fb736130b4a19276c01092cf78d24e.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            transition: 0.4s;
        }

        .theme-switch {
            position: absolute; top: 15px; right: 15px; cursor: pointer; z-index: 100;
        }
        .theme-switch svg { width: 22px; height: 22px; fill: var(--accent); }

        .main-card {
            background: var(--glass); backdrop-filter: blur(15px);
            width: 100%; height: 100%; max-width: 500px;
            margin: auto; display: flex; flex-direction: column;
            padding: 1rem 1.5rem calc(1rem + env(safe-area-inset-bottom));
            position: absolute; top: 0; left: 50%; transform: translate(-50%, 0);
        }

        .header-area { flex: 0 1 auto; text-align: center; padding-top: 5px; }
        .logo-main { width: 100%; max-width: 240px; height: auto; margin-bottom: 5px; }

        .form-area { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; gap: 8px; overflow-y: auto; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-group label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 3px; }
        
        .input-with-icon { position: relative; display: flex; align-items: center; }
        .input-with-icon svg { position: absolute; left: 12px; width: 18px; height: 18px; fill: var(--whatsapp-green); }
        .input-with-icon input { padding-left: 38px; }

        input {
            width: 100%; padding: 11px; border-radius: 10px; border: 1.5px solid var(--accent);
            background: var(--input-bg); color: var(--text-primary); font-size: 0.9rem; outline: none;
        }

        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .service-btn {
            background: var(--input-bg); border: 1px solid var(--accent);
            padding: 13px 4px; border-radius: 10px; color: var(--text-primary);
            font-size: 0.8rem; text-transform: uppercase; font-weight: 700;
            cursor: pointer; transition: 0.2s; text-align: center;
        }
        .service-btn.selected { background: var(--accent); color: #fff; border-color: #fff; }

        .location-area { margin-top: 10px; padding-top: 5px; border-top: 1px solid rgba(180, 134, 126, 0.2); text-align: center; }
        .location-btns { display: flex; justify-content: center; gap: 30px; margin-top: 8px; }
        .loc-btn img {
            width: 48px; height: 48px; 
            transition: transform 0.2s;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.4));
        }
        .loc-btn:active img { transform: scale(0.9); }

        .footer-area { flex: 0 0 auto; text-align: center; padding-top: 10px; }
        .btn-confirm {
            background: var(--accent); color: white; border: none;
            padding: 16px; border-radius: 12px; width: 100%;
            font-weight: 700; text-transform: uppercase; cursor: pointer;
        }

        .insta-footer { 
            margin-top: 10px; font-size: 0.9rem; color: var(--text-secondary); 
            font-family: 'Playfair Display', serif; display: flex;
            align-items: center; justify-content: center; gap: 6px;
            font-weight: 700; text-decoration: none;
        }
        .insta-footer svg { width: 18px; height: 18px; fill: var(--accent); }
    </style>
</head>
<body class="dark-mode">

<div class="theme-switch" onclick="toggleTheme()" id="themeBtn">
    <svg viewBox="0 0 24 24" id="themeIcon"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/></svg>
</div>

<div class="main-card" id="app-content">
    <div class="header-area">
        <img src="plano_fundo.png" alt="Rita Andrade" class="logo-main">
    </div>
    
    <div class="form-area">
        <div class="input-row">
            <div class="input-group"><label>Nome</label><input type="text" id="nome" placeholder="Nome"></div>
            <div class="input-group"><label>Sobrenome</label><input type="text" id="sobrenome" placeholder="Sobrenome"></div>
        </div>
        
        <div class="input-group">
            <label>WhatsApp</label>
            <div class="input-with-icon">
                <svg viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.7 17.8 69.7 27.2 106.2 27.2 122.4 0 222-99.6 222-222 0-59.3-23-115.1-65-157.1zM223.9 446.3c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 365.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.5-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 54 81.2 54 130.4 0 101.7-82.8 184.5-184.5 184.5zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.4-8.6-44.6-27.5-16.4-14.7-27.5-32.8-30.7-38.3-3.2-5.6-.3-8.6 2.5-11.4 2.5-2.5 5.6-6.5 8.3-9.7 2.8-3.3 3.7-5.6 5.6-9.3 1.9-3.7 .9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" onkeyup="mascaraTel(this)">
            </div>
        </div>

        <div class="input-group">
            <label>Nossos Serviços</label>
            <div class="services-grid">
                <div class="service-btn" onclick="toggleService(this, 'ALONGAMENTO')">ALONGAMENTO</div>
                <div class="service-btn" onclick="toggleService(this, 'BANHO')">BANHO</div>
                <div class="service-btn" onclick="toggleService(this, 'ESMALTAÇÃO EM GEL')">ESMALTAÇÃO EM GEL</div>
                <div class="service-btn" onclick="toggleService(this, 'MANUTENÇÃO')">MANUTENÇÃO</div>
                <div class="service-btn" onclick="toggleService(this, 'PEDICURE')">PEDICURE</div>
                <div class="service-btn" onclick="toggleService(this, 'MANICURE')">MANICURE</div>
            </div>
        </div>

        <div class="input-group">
            <label>Data e Horário</label>
            <input type="datetime-local" id="data_hora">
        </div>

        <div class="location-area">
            <label style="font-size: 0.65rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 5px;">Como chegar</label>
            <div class="location-btns">
                <a href="https://www.google.com/maps/dir/?api=1&destination=Rua%20Placido%20Aderaldo%20Castelo%20469%20Capuan%20Caucaia%20CE" target="_blank" class="loc-btn">
                    <img src="maps.png" alt="Google Maps">
                </a>
                <a href="https://waze.com/ul?q=Rua%20Placido%20Aderaldo%20Castelo%20469%20Capuan%20Caucaia%20CE&navigate=yes" target="_blank" class="loc-btn">
                    <img src="waze.png" alt="Waze">
                </a>
            </div>
        </div>
    </div>

    <div class="footer-area">
        <button class="btn-confirm" onclick="finalizar()">Confirmar Agendamento</button>
        <a href="https://instagram.com/ritinhaandradeunhas" class="insta-footer" target="_blank">
            <svg viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/></svg>
            ritinhaandradeunhas
        </a>
    </div>
</div>

<script>
    // Sistema de Auto-Update em tempo real
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then((reg) => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            window.location.reload();
                        }
                    };
                };
            });
        });
    }

    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { window.location.reload(); refreshing = true; }
    });

    // Lógica do Agendamento
    let servicosSelecionados = [];

    function toggleService(element, serviceName) {
        element.classList.toggle('selected');
        if (servicosSelecionados.includes(serviceName)) {
            servicosSelecionados = servicosSelecionados.filter(s => s !== serviceName);
        } else {
            servicosSelecionados.push(serviceName);
        }
    }

    function mascaraTel(i) {
        let v = i.value.replace(/\D/g,'');
        v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
        v = v.replace(/(\d)(\d{4})$/,"$1-$2");
        i.value = v;
    }

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('themeIcon');
        body.classList.toggle('light-mode');
        if(body.classList.contains('light-mode')) {
            icon.innerHTML = '<path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 1.536 17.151 9 9 0 1 1-1.929-17.158c.13-.003.26-.003.393-.003z"/>';
        } else {
            icon.innerHTML = '<path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM2 13h2a1 1 0 1 0 0-2H2a1 1 0 1 0 0 2zm18 0h2a1 1 0 1 0 0-2h-2a1 1 0 1 0 0 2zM11 2v2a1 1 0 1 0 2 0V2a1 1 0 1 0-2 0zm0 18v2a1 1 0 1 0 2 0v-2a1 1 0 1 0-2 0zM5.99 4.58a1 1 0 1 0-1.41 1.41l1.41 1.41a1 1 0 1 0 1.41-1.41L5.99 4.58zm12.02 12.02a1 1 0 1 0-1.41 1.41l1.41 1.41a1 1 0 1 0 1.41-1.41l-1.41-1.41zM4.58 18.01a1 1 0 1 0 1.41 1.41l1.41-1.41a1 1 0 1 0-1.41-1.41l-1.41 1.41zM18.01 5.99a1 1 0 1 0 1.41-1.41l-1.41-1.41a1 1 0 1 0-1.41 1.41l1.41 1.41z"/>';
        }
    }

    function finalizar() {
        const nome = document.getElementById('nome').value;
        const data = document.getElementById('data_hora').value;
        if(!nome || servicosSelecionados.length === 0 || !data) return alert("Por favor, preencha todos os campos.");
        
        const dataFormatada = new Date(data).toLocaleString('pt-BR');
        const msg = `Olá Rita! Me chamo ${nome}. Gostaria de agendar: ${servicosSelecionados.join(', ')} para o horário: ${dataFormatada}.`;
        window.open(`https://wa.me/55SEUNUMERO?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
